<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Segunda História | Brechó</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>


<body>


<header>

<div class="logo">
<h1>Segunda História</h1>
<p>Moda sustentável com novas histórias ♻️</p>
</div>


<div class="acoes">

<button onclick="abrirFavoritos()">
❤️ Favoritos
</button>

<button onclick="abrirCarrinho()">
🛒 Carrinho
<span id="contador">0</span>
</button>

</div>


</header>



<section class="banner">

<div>

<h2>
Peças únicas esperando por você
</h2>

<p>
Garimpos especiais, preços acessíveis e moda consciente.
</p>


</div>

</section>



<section class="filtros">


<input 
type="text" 
id="busca"
placeholder="🔎 Procurar peça..."
onkeyup="filtrarProdutos()"
>



<select id="categoria" onchange="filtrarProdutos()">

<option value="">
Todas categorias
</option>

<option>
Vestidos
</option>

<option>
Blusas
</option>

<option>
Calças
</option>

<option>
Casacos
</option>

</select>



<select id="tamanho" onchange="filtrarProdutos()">

<option value="">
Todos tamanhos
</option>

<option>
PP
</option>

<option>
P
</option>

<option>
M
</option>

<option>
G
</option>

<option>
GG
</option>


</select>


</section>




<section>

<h2 class="titulo">
Nossas peças
</h2>


<div id="produtos" class="produtos">

<!-- Produtos aparecem automaticamente aqui -->

</div>

<div id="controleAdmin" class="produtos"></div>

</section>





<!-- ÁREA DE CADASTRO -->


<section class="cadastro" id="areaCadastro">


<h2>
Cadastrar nova peça
</h2>


<input id="nomeProduto" placeholder="Nome da peça">


<input id="imagemProduto" placeholder="Imagem (ex: roupa4.jpg)">



<input id="precoProduto" placeholder="Preço">


<select id="categoriaProduto">

<option>
Vestidos
</option>

<option>
Blusas
</option>

<option>
Calças
</option>

<option>
Casacos
</option>


</select>



<select id="tamanhoProduto">

<option>
PP
</option>

<option>
P
</option>

<option>
M
</option>

<option>
G
</option>

<option>
GG
</option>

</select>



<button onclick="cadastrarProduto()">
Adicionar peça
</button>



</section>






<div id="modalCarrinho" class="modal">

<div class="conteudo">

<h2>
🛒 Meu Carrinho
</h2>


<div id="listaCarrinho"></div>


<button onclick="finalizarCompra()">
Comprar pelo WhatsApp
</button>


<button onclick="fecharModal()">
Fechar
</button>


</div>

</div>

<button class="admin-btn" onclick="abrirAdmin()">
🔐 Área da loja
</button>


<div id="adminModal" class="modal">

<div class="conteudo">

<h2>
Área administrativa
</h2>


<input 
type="password"
id="senhaAdmin"
placeholder="Digite a senha"
>


<button onclick="entrarAdmin()">
Entrar
</button>


<button onclick="fecharAdmin()">
Fechar
</button>


</div>

</div>


<footer>

Segunda História © 2026

</footer>

<script src="./dados/produtos.js"></script>

<script src="./script.js"></script>

</body>

</html>
